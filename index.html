<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Facilit Audit · Inteligência em Auditoria</title>
    <link rel="stylesheet" href="./style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <script>
      const AI_STUDIO_KEY = "AIzaSyADBDhFYpy0RbGzPLf9rvLkjyuP6FSpgRI";

      // Configuração global para o seu main.js consumir
      window.fbMethods = { 
        ready: true,
        apiKey: AI_STUDIO_KEY,
        modelIA: {
          generateContent: async (prompt) => {
            // URL configurada para a versão v1beta do Gemini 1.5 Flash
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${AI_STUDIO_KEY}`;
            
            const response = await fetch(url, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                // Ajuste na estrutura JSON para compatibilidade total com AI Studio
                contents: [{ 
                  parts: [{ text: prompt }] 
                }]
              })
            });

            const data = await response.json();

            if (!response.ok) {
              console.error("Erro detalhado na IA:", data);
              throw new Error(data.error?.message || 'Erro na chamada da IA');
            }
            
            // Retorna o formato que o seu main.js espera (objeto com método text())
            return {
              response: {
                text: () => data.candidates[0].content.parts[0].text
              }
            };
          }
        }
      };
      console.log("🚀 FACILIT AUDIT: Motor AI Studio Corrigido");
    </script>
  </head>
  <body>
    <canvas id="bg"></canvas>

    <div id="home-overlay" class="overlay fade-in">
      <div class="menu-box">
        <h1 class="menu-title">Facilit Audit</h1>
        <nav class="center-menu">
          <a class="menu-btn" data-nav="audit-tool">Leitura de Extrato</a>
        </nav>
      </div>
      <p class="hint">Clique com o botão esquerdo para mudar a cor da centopeia.</p>
    </div>

    <section id="audit-tool" class="page hidden">
      <header class="topbar">
        <a class="toplink" data-nav="home">← Home</a>
        <h1 class="menu-title" style="margin:0; letter-spacing: 4px; font-size: 0.8rem;">Tratamento de Saldos</h1>
      </header>
      
      <div class="content fade-in">
        <p class="lead">Upload de Extratos para Conciliação Bancária</p>
        
        <div id="drop-zone" class="drop-zone">
          <div style="display: flex; flex-direction: column; gap: 15px; align-items: center;">
            <span class="drop-zone__prompt" style="font-size: 0.7rem; letter-spacing: 2px; opacity: 0.6;">
              ARRASTE O EXTRATO OU CLIQUE PARA UPLOAD
            </span>
            <a href="./modelo_auditoria.xlsx" 
               download 
               class="menu-btn" 
               style="font-size: 0.5rem; padding: 5px 15px; width: fit-content; border-color: rgba(124, 255, 176, 0.3); pointer-events: auto;">
              BAIXAR MODELO (.XLSX)
            </a>
          </div>
          <input type="file" name="myFile" class="drop-zone__input" accept=".csv, .xlsx, .xls, .pdf">
        </div>

        <div id="audit-status" class="hidden">
          <div class="loader"></div>
          <p id="status-text" style="font-size: 0.65rem; letter-spacing: 2px; text-align: center; opacity: 0.7;">
            MAPEANDO DADOS...
          </p>
        </div>
      </div>
    </section>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
